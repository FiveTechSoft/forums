<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Page not found - FiveTech Support Forums</title>
<link rel="icon" href="/forums/favicon.ico">
<link rel="stylesheet" href="/forums/style.css">
<script>
(function() {
  var t = localStorage.getItem('forum-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
// Map old phpBB URLs to the static archive equivalents.
(function() {
  var path = location.pathname;
  var qs = location.search;
  var dest = null;

  // viewtopic.php?t=12345 (with optional &p=, &start=, etc) -> topic-12345.html
  // Also catches viewtopic.php?p=NNN (post id) — fallback to home if no t.
  if (/\/viewtopic\.php$/i.test(path)) {
    var m = qs.match(/[?&]t=(\d+)/);
    if (m) dest = '/forums/topic-' + m[1] + '.html';
    else {
      var p = qs.match(/[?&]p=(\d+)/);
      if (p) dest = '/forums/?p=' + p[1];  // can't resolve post->topic offline
    }
  }
  // viewforum.php?f=3 -> forum-3.html
  else if (/\/viewforum\.php$/i.test(path)) {
    var m = qs.match(/[?&]f=(\d+)/);
    if (m) dest = '/forums/forum-' + m[1] + '.html';
  }
  // index.php -> root index
  else if (/\/index\.php$/i.test(path)) {
    dest = '/forums/';
  }
  // memberlist.php?u=42 -> user-42.html (if/when individual profiles exist)
  else if (/\/memberlist\.php$/i.test(path)) {
    var m = qs.match(/[?&]u=(\d+)/);
    if (m) dest = '/forums/user-' + m[1] + '.html';
    else dest = '/forums/memberlist.html';
  }

  if (dest) {
    location.replace(dest);
  }
})();
</script>
</head>
<body>
<div class="wrap">
  <div class="header">
    <a class="logo" href="/forums/"><img src="/forums/site_logo.svg" alt="FiveTech Support Forums" width="200" height="60"></a>
    <div class="header-text"><h1>FiveTech Support Forums</h1>
    <div class="sub">FiveWin / <a href="https://github.com/harbour/core" target="_blank" rel="noopener">Harbour</a> / xBase community</div></div>
  </div>
  <div class="navbar">
    <a href="/forums/">Board index</a>
    <a href="/forums/search.html">Search</a>
  </div>
  <div style="padding:30px;text-align:center;">
    <h2>404 — Page not found</h2>
    <p>The page you requested does not exist in this static archive.</p>
    <p>If you arrived from an old phpBB link, you should have been auto-redirected. If not, try the <a href="/forums/">board index</a>.</p>
  </div>
  <div class="footer">Static archive · 404</div>
</div>
</body>
</html>
