name: Daily forum sync

on:
  schedule:
    # 11:00 UTC daily. Server cron-dump.sh regenerates the dump at 10:00 UTC,
    # so the fresh dump is available before this sync runs.
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          pip install --quiet markdown

      - name: Download daily dump via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          curl --fail --silent --show-error --max-time 600 \
            --user "$FTP_USER:$FTP_PASS" \
            -o forums_daily.sql.gz \
            "ftp://$FTP_HOST/forums_daily.sql.gz"
          ls -la forums_daily.sql.gz
          gunzip -k forums_daily.sql.gz
          ls -la forums_daily.sql

      - name: Sync avatars from FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python <<'PY'
          import ftplib, os, re
          SALT = "6f0acc6004670bf9cdefdc1910fe12de_"
          ftp = ftplib.FTP(os.environ['FTP_HOST'], timeout=120)
          ftp.login(os.environ['FTP_USER'], os.environ['FTP_PASS'])
          ftp.set_pasv(True)
          ftp.cwd("/www/forums/images/avatars/upload/")
          os.makedirs("avatars", exist_ok=True)
          new = 0
          for n in ftp.nlst():
              if not n.startswith(SALT): continue
              base = n[len(SALT):]
              if not re.match(r"^\d+\.[a-z]+$", base.lower()): continue
              local = os.path.join("avatars", base)
              if os.path.exists(local): continue
              with open(local, "wb") as f:
                  ftp.retrbinary(f"RETR {n}", f.write)
              new += 1
          print(f"new avatars: {new}")
          ftp.quit()
          PY

      - name: Import dump into SQLite
        run: python scripts/import_dump.py forums_daily.sql forums.db

      - name: Generate static site
        run: python scripts/generate.py forums.db .

      - name: Build Pagefind search index
        run: |
          rm -rf pagefind
          npx --yes pagefind@latest --site . --output-path pagefind --glob "topic-*.html"
          du -sh pagefind || true

      - name: Commit changes if any
        run: |
          git config user.email "actions@github.com"
          git config user.name "FiveTech Forum Sync"
          git add -A '*.html' avatars/ smilies/ style.css pagefind/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            n=$(git diff --cached --numstat | wc -l)
            git commit -m "Daily sync $(date -u +%Y-%m-%d) — $n files changed"
            git push
          fi

      - name: Cleanup workspace artifacts
        if: always()
        run: |
          rm -f forums_daily.sql forums_daily.sql.gz forums.db
