<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Search - FiveTech Support Forums</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="style.css">
<script>
(function() {
  var t = localStorage.getItem('forum-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<style>
.search-container { padding:14px; }
#search-input { width:100%; padding:10px 12px; font-size:16px;
  border:1px solid var(--border); background: var(--c02); color: var(--fg); }
.search-status { padding:8px 0; color: var(--fg-muted); font-size:12px; }
.search-results { margin-top:10px; }
.search-results mark { background: rgba(255,200,0,0.4); color: inherit; padding: 0 2px; }
.search-ellipsis { color: var(--fg-muted); }
.load-more { display:block; margin:14px auto; padding:8px 18px; background: var(--c02);
  border:1px solid var(--border); color: var(--link); cursor:pointer; font-size:12px; }
.load-more:hover { color: var(--link-hover); }
@media (max-width:700px) {
  .search-container { padding:8px 4px; }
  #search-input { padding:12px; font-size:18px; }
  .search-status { font-size:14px; }
  .load-more { font-size:15px; padding:10px 20px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <a class="logo" href="index.html"><img src="site_logo.svg" alt="FiveTech Support Forums" width="200" height="60"></a>
    <div class="header-text">
      <h1>FiveTech Support Forums</h1>
      <div class="sub"><a href="https://fivetechsoft.github.io/" target="_blank" rel="noopener">FiveWin</a> / <a href="https://github.com/harbour/core" target="_blank" rel="noopener">Harbour</a> / xBase community</div>
    </div>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">🌓</button>
  </div>
  <div class="navbar">
    <a href="index.html">Board index</a>
    <a href="search.html"><strong>Search</strong></a>
    <a href="https://github.com/FiveTechSoft/forums/discussions" target="_blank">All discussions</a>
    <a href="https://github.com/login" target="_blank">Login (GitHub)</a>
  </div>
  <div class="crumbs"><a href="index.html">Board index</a> Search</div>
  <div class="cat">Search the archive</div>
  <div class="search-container">
    <input id="search-input" type="search" placeholder="Search posts..." autocomplete="off" spellcheck="false">
    <div class="search-status" id="search-status"></div>
    <div class="search-results" id="search-results"></div>
    <button class="load-more" id="load-more" type="button" hidden>More results</button>
  </div>
  <div class="footer">Powered by Pagefind · Static archive</div>
</div>
<script type="module">
import * as pagefind from '/forums/pagefind/pagefind.js';

const PAGE_SIZE = 10;
const input = document.getElementById('search-input');
const statusEl = document.getElementById('search-status');
const resultsEl = document.getElementById('search-results');
const moreBtn = document.getElementById('load-more');

let currentSearch = null;
let currentQuery = '';
let renderToken = 0;
let renderedCount = 0;
const topicCache = new Map();

function fetchTopic(url) {
  const key = url.split('#')[0];
  let p = topicCache.get(key);
  if (!p) {
    p = fetch(key).then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(html => new DOMParser().parseFromString(html, 'text/html'))
      .catch(() => null);
    topicCache.set(key, p);
  }
  return p;
}

function buildFallbackPost(sub) {
  const div = document.createElement('div');
  div.className = 'post';
  const subj = (sub.title || sub.url || '').toString();
  const subjEsc = subj.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  div.innerHTML =
    '<div class="poster">' +
      '<div class="name">&nbsp;</div>' +
      '<div class="avatar"></div>' +
    '</div>' +
    '<div class="body">' +
      '<div class="meta">' +
        '<h3 class="subject"><a href="' + sub.url + '">' + subjEsc + '</a></h3>' +
      '</div>' +
      '<div class="content">' + (sub.excerpt || '') + '</div>' +
    '</div>';
  return div;
}

function renderSubResult(sub, doc) {
  const hashIdx = sub.url.indexOf('#');
  const anchor = hashIdx >= 0 ? sub.url.slice(hashIdx + 1) : '';
  const head = anchor && doc && doc.getElementById(anchor);
  const postNode = head && head.closest('.post');
  if (!postNode) return buildFallbackPost(sub);

  const clone = postNode.cloneNode(true);
  // Replace body content with the pagefind excerpt so the highlighted match shows.
  const content = clone.querySelector('.body .content');
  if (content) {
    content.innerHTML = '<span class="search-ellipsis">…</span> ' + (sub.excerpt || '') + ' <span class="search-ellipsis">…</span>';
  }
  // Linkify the subject so clicking it jumps to the post.
  const subject = clone.querySelector('.body .meta h3.subject');
  if (subject && !subject.querySelector('a')) {
    const link = document.createElement('a');
    link.href = sub.url;
    link.textContent = subject.textContent;
    subject.textContent = '';
    subject.appendChild(link);
  }
  return clone;
}

async function renderResult(data) {
  const subs = (data.sub_results && data.sub_results.length)
    ? data.sub_results
    : [{ url: data.url, title: data.meta && data.meta.title, excerpt: data.excerpt }];
  const doc = await fetchTopic(data.url);
  for (const sub of subs) {
    resultsEl.appendChild(renderSubResult(sub, doc));
  }
}

async function renderMore() {
  if (!currentSearch) return;
  const token = renderToken;
  moreBtn.disabled = true;
  const slice = currentSearch.results.slice(renderedCount, renderedCount + PAGE_SIZE);
  for (const r of slice) {
    if (token !== renderToken) return;
    try {
      const data = await r.data();
      if (token !== renderToken) return;
      await renderResult(data);
    } catch (e) {
      console.warn('result render failed', e);
    }
  }
  if (token !== renderToken) return;
  renderedCount += slice.length;
  moreBtn.hidden = renderedCount >= currentSearch.results.length;
  moreBtn.disabled = false;
}

async function doSearch(q) {
  currentQuery = q;
  renderToken++;
  resultsEl.innerHTML = '';
  renderedCount = 0;
  moreBtn.hidden = true;
  if (!q.trim()) { statusEl.textContent = ''; currentSearch = null; return; }
  statusEl.textContent = `Searching for "${q}"…`;
  let s;
  try {
    s = await pagefind.search(q);
  } catch (e) {
    statusEl.textContent = `Search error: ${e.message || e}`;
    return;
  }
  if (currentQuery !== q) return; // a newer query superseded this one
  currentSearch = s;
  const n = s.results.length;
  if (!n) { statusEl.textContent = `No results for "${q}"`; return; }
  statusEl.textContent = `${n} ${n === 1 ? 'result' : 'results'} for "${q}"`;
  await renderMore();
}

let timer = null;
input.addEventListener('input', () => {
  clearTimeout(timer);
  const q = input.value;
  timer = setTimeout(() => doSearch(q), 200);
});
moreBtn.addEventListener('click', renderMore);

// Pre-fill from ?q=
const qParam = new URLSearchParams(location.search).get('q');
if (qParam) { input.value = qParam; doSearch(qParam); }
input.focus();

// Theme toggle
(function() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.addEventListener('click', function() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('forum-theme', next);
  });
})();
</script>
</body>
</html>
