<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Search - FiveTech Support Forums</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="/forums/pagefind/pagefind-ui.css">
<script>
(function() {
  var t = localStorage.getItem('forum-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<style>
.search-container { padding:14px; }
.pagefind-ui__search-input { width:100%; padding:10px 12px; font-size:16px;
  border:1px solid var(--border); background: var(--c02); color: var(--fg); }
.pagefind-ui__search-clear { font-size:14px; padding:0 10px; }
.pagefind-ui__message { padding:8px 0; color: var(--fg-muted); font-size:12px; }
.pagefind-ui__results-area { margin-top:10px; }
.pagefind-ui__filters, .pagefind-ui__form { color: var(--fg); }

/* Result cards styled like forum posts (.post / .body in style.css) */
.pagefind-ui__result {
  background: var(--c02);
  border: 1px solid var(--border);
  margin: 8px 0;
  padding: 12px 16px;
  list-style: none;
}
.pagefind-ui__result-title {
  margin: 0 0 6px 0;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.4;
}
.pagefind-ui__result-title a {
  color: var(--link);
  font-weight: bold;
}
.pagefind-ui__result-excerpt {
  color: var(--fg);
  font-size: 13px;
  line-height: 1.55;
  margin: 4px 0;
}
.pagefind-ui__result-excerpt mark {
  background: rgba(255,200,0,0.4);
  color: inherit;
  padding: 0 2px;
}
.pagefind-ui__result-sub {
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px dashed var(--border);
  font-size: 12px;
  color: var(--fg-muted);
}
.pagefind-ui__result-sub .pagefind-ui__result-title,
.pagefind-ui__result-sub-title {
  border: 0; padding: 0; margin: 0 0 2px 0; font-size: 12px;
}
.pagefind-ui__result-sub a { color: var(--link); }

@media (max-width:700px) {
  .search-container { padding:8px 4px; }
  .pagefind-ui__search-input { padding:12px; font-size:18px; }
  .pagefind-ui__result { padding: 10px 12px; }
  .pagefind-ui__result-title { font-size:17px; line-height:1.3; }
  .pagefind-ui__result-excerpt { font-size:16px; line-height:1.5; }
  .pagefind-ui__result-sub { font-size:14px; }
  .pagefind-ui__message { font-size:14px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <a class="logo" href="index.html"><img src="site_logo.svg" alt="FiveTech Support Forums" width="200" height="60"></a>
    <div class="header-text">
      <h1>FiveTech Support Forums</h1>
      <div class="sub"><a href="https://fivetechsoft.github.io/" target="_blank" rel="noopener">FiveWin</a> / <a href="https://github.com/harbour/core" target="_blank" rel="noopener">Harbour</a> / xBase community</div>
    </div>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">🌓</button>
  </div>
  <div class="navbar">
    <a href="index.html">Board index</a>
    <a href="search.html"><strong>Search</strong></a>
    <a href="https://github.com/FiveTechSoft/forums/discussions" target="_blank">All discussions</a>
    <a href="https://github.com/login" target="_blank">Login (GitHub)</a>
  </div>
  <div class="crumbs"><a href="index.html">Board index</a> Search</div>
  <div class="cat">Search the archive</div>
  <div class="search-container">
    <div id="search"></div>
  </div>
  <div class="footer">Powered by Pagefind · Static archive</div>
</div>
<script src="/forums/pagefind/pagefind-ui.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  new PagefindUI({
    element: '#search',
    showImages: false,
    showSubResults: true,
    excerptLength: 30,
    resetStyles: false,
    translations: {
      placeholder: 'Search posts...',
      clear_search: 'Clear',
      load_more: 'More',
      search_label: 'Search',
      filters_label: 'Filters',
      zero_results: 'No results for [SEARCH_TERM]',
      many_results: '[COUNT] results for [SEARCH_TERM]',
      one_result: '1 result for [SEARCH_TERM]',
      alt_search: 'No results for [SEARCH_TERM]. Showing [DISPLAY_QUERY] instead',
      search_suggestion: 'No results. Try [DISPLAY_QUERY]',
      searching: 'Searching for [SEARCH_TERM]...'
    }
  });
});
// Theme + hljs toggle inherits global behavior from generated pages.
(function() {
  var btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.addEventListener('click', function() {
    var cur = document.documentElement.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('forum-theme', next);
  });
})();
</script>
</body>
</html>
